# =============================================================================
# Dev Environment — Global Overrides
# =============================================================================
# Applied to ALL services in dev via ArgoCD ApplicationSet multi-valueFile
# =============================================================================

replicaCount: 1

image:
  pullPolicy: IfNotPresent

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi

config:
  LOG_LEVEL: "debug"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://signoz-df69d76b-otel-collector.observability:4318"

hpa:
  enabled: false

pdb:
  enabled: false

rollout:
  enabled: false

# Dev images use uv which needs write access to /app and /home/app/.cache
# Staging/prod should use readOnlyRootFilesystem: true with proper Dockerfiles
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL

podSecurityContext:
  runAsNonRoot: false
  seccompProfile:
    type: RuntimeDefault
