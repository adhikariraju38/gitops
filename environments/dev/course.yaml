serviceName: ms-course-service
image:
  repository: astha-platform/ms-course-service
  tag: "v1.0.0"
config:
  APP_NAME: "ms-course-service"
  APP_PORT: "5000"
  APP_LOG_LEVEL: "INFO"
  REDIS_URL: "redis://redis.dev.svc.cluster.local:6379/2"
  GCS_CERTIFICATES_BUCKET: "astha-certificates-dev"
externalSecret:
  enabled: true
  secrets:
    - key: dev-postgres-course-url
      property: DATABASE_URL
    - key: dev-github-api-token
      property: GITHUB_API_TOKEN
