serviceName: ms-questionnaires-service
image:
  repository: astha-platform/ms-questionnaires-service
  tag: "sha-bffcfc0"
config:
  APP_NAME: "ms-questionnaires-service"
  APP_PORT: "5000"
  APP_DEBUG: "false"
  APP_LOG_LEVEL: "INFO"
  APP_ENVIRONMENT: "development"
  APP_API_PREFIX: "/api/v1"
  STORAGE_PROVIDER: "gcs"
  STORAGE_BUCKET: "astha-evidence-dev"
  GITHUB_QUESTIONS_OWNER: "AsthaAi"
  GITHUB_QUESTIONS_REPO: "safe-framework-questions"
  GITHUB_METADATA_OWNER: "AsthaAi"
  GITHUB_METADATA_REPO: "safe-framework-questions-metadata"
  CACHE_TTL_SECONDS: "28800"
  SEEDER_ALLOW_SEEDING: "true"
  SEEDER_RELEASE_TAG: "Release_V_2_1"
  UMS_BASE_URL: "http://ms-user-management-service.dev.svc.cluster.local:5000/api/v1"
  UMS_TIMEOUT: "30.0"
  UMS_CALLBACK_BASE_URL: "http://ms-user-management-service.dev.svc.cluster.local:5000/api/v1"
  OTEL_ENABLED: "true"
externalSecret:
  enabled: true
  secrets:
    - key: dev-postgres-questionnaires-url
      property: DATABASE_URL
    - key: dev-github-api-token
      property: GITHUB_TOKEN
    - key: dev-redis-url-db0
      property: REDIS_URL
