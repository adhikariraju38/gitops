serviceName: ms-authorization-service
image:
  repository: astha-platform/ms-authorization-service
  tag: "sha-1117163"
config:
  APP_NAME: "ms-authorization-service"
  APP_PORT: "5000"
  APP_DEBUG: "false"
  APP_LOG_LEVEL: "INFO"
  APP_ALLOW_SEEDING: "true"
  SEEDER_DIR: "/app/seeders"
  APP_WORKERS: "1"
  OPA_URL: "http://opa.dev.svc.cluster.local:8181"
  OPA_TIMEOUT: "5"
  CACHE_ENABLED: "true"
  CACHE_TTL: "60"
  METRICS_ENABLED: "false"
  OTEL_ENABLED: "false"
externalSecret:
  enabled: true
  secrets:
    - key: dev-postgres-authorization-url
      property: DATABASE_URL
    - key: dev-redis-url-db0
      property: REDIS_URL
