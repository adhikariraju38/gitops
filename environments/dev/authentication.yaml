serviceName: ms-authentication-service
image:
  repository: astha-platform/ms-authentication-service
  tag: "sha-7c6d6c4"
config:
  APP_ENV: "dev"
  PORT: "5000"
  LOG_LEVEL: "info"
  KEYCLOAK_BASE_URL: "https://auth.astha.ai"
  KEYCLOAK_REALM: "astha-testbox"
  KEYCLOAK_CLIENT_ID: "astha-testbox-connect"
  OTEL_ENABLED: "false"
externalSecret:
  enabled: true
  secrets:
    - key: dev-keycloak-client-secret
      property: KEYCLOAK_CLIENT_SECRET
