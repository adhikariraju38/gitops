serviceName: ms-authentication-service
image:
  repository: astha-platform/ms-authentication-service
  tag: "v1.0.0"
config:
  SERVICE_NAME: "ms-authentication-service"
  DATABASE_HOST: "10.49.96.3" # Cloud SQL private IP (update after deploy)
  DATABASE_NAME: "authentication"
  DATABASE_PORT: "5432"
  REDIS_HOST: "redis.dev.svc.cluster.local"
  REDIS_PORT: "6379"
externalSecret:
  enabled: true
  secrets:
    - key: dev-postgres-authentication-password
      property: DATABASE_PASSWORD
    - key: dev-keycloak-client-secret
      property: KEYCLOAK_CLIENT_SECRET
