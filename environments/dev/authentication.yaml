serviceName: ms-authentication-service
image:
  repository: astha-platform/ms-authentication-service
  tag: "sha-98da6e0"
config:
  APP_ENV: "dev"
  PORT: "5000"
  LOG_LEVEL: "info"
  KEYCLOAK_BASE_URL: "http://keycloak.dev.svc.cluster.local:8080"
  KEYCLOAK_REALM: "astha-dev"
  KEYCLOAK_CLIENT_ID: "astha-platform"
  OTEL_ENABLED: "false"
externalSecret:
  enabled: true
  secrets:
    - key: dev-keycloak-client-secret
      property: KEYCLOAK_CLIENT_SECRET
