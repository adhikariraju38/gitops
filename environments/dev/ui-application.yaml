serviceName: ms-ui-application
image:
  repository: astha-platform/ms-ui-application
  tag: "sha-c5054d4"
containerPort: 3000
service:
  type: LoadBalancer
  port: 3000
config:
  SERVICE_NAME: "ms-ui-application"
  NEXT_PUBLIC_API_URL: "http://34.68.237.85:8080/api/v1"
probes:
  startup:
    enabled: true
    path: /
    periodSeconds: 5
    failureThreshold: 30
  liveness:
    enabled: true
    path: /
    periodSeconds: 15
    failureThreshold: 3
  readiness:
    enabled: true
    path: /
    periodSeconds: 10
    failureThreshold: 3
externalSecret:
  enabled: false
podLabels:
  tier: frontend
