serviceName: ms-api-gateway-service
image:
  repository: astha-platform/ms-api-gateway-service
  tag: "sha-11bcd77"
containerPort: 8080
service:
  type: LoadBalancer
  port: 8080
config:
  SERVICE_NAME: "ms-api-gateway-service"
  NAMESPACE: "dev"
  UMS_SERVICE_HOST: "ms-user-management-service.dev.svc.cluster.local"
  NOTIFICATION_SERVICE_HOST: "ms-notification-service.dev.svc.cluster.local"
  AUTHENTICATION_SERVICE_HOST: "ms-authentication-service.dev.svc.cluster.local"
  AUTHORIZATION_SERVICE_HOST: "ms-authorization-service.dev.svc.cluster.local"
  QUESTIONNAIRES_SERVICE_HOST: "ms-questionnaires-service.dev.svc.cluster.local"
  COURSE_SERVICE_HOST: "ms-course-service.dev.svc.cluster.local"
  UI_APPLICATION_HOST: "ms-ui-application.dev.svc.cluster.local"
  UMS_SERVICE_PORT: "5000"
  NOTIFICATION_SERVICE_PORT: "5000"
  AUTHENTICATION_SERVICE_PORT: "5000"
  AUTHORIZATION_SERVICE_PORT: "5000"
  QUESTIONNAIRES_SERVICE_PORT: "5000"
  COURSE_SERVICE_PORT: "5000"
  UI_APPLICATION_PORT: "3000"
  FRONTEND_ORIGIN: "http://34.68.237.85:3000"
probes:
  startup:
    enabled: true
    path: /ready
    periodSeconds: 5
    failureThreshold: 30
  liveness:
    enabled: true
    path: /ready
    periodSeconds: 10
    failureThreshold: 3
  readiness:
    enabled: true
    path: /ready
    periodSeconds: 5
    failureThreshold: 3
externalSecret:
  enabled: false
podLabels:
  tier: gateway
extraVolumes:
  - name: envoy-config
    configMap:
      name: envoy-config
extraVolumeMounts:
  - name: envoy-config
    mountPath: /etc/envoy
    readOnly: true
