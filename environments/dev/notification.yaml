serviceName: ms-notification-service
image:
  repository: astha-platform/ms-notification-service
  tag: "v1.1.0"
config:
  APP_NAME: "notification-service"
  APP_PORT: "5000"
  APP_DEBUG: "false"
  APP_LOG_LEVEL: "INFO"
  EMAIL_PROVIDER: "SENDGRID_API_CLIENT"
  SENDGRID_FROM_EMAIL: "dev@astha.ai"
  SENDGRID_FROM_NAME: "Astha AI"
  COMPANY_NAME: "Astha AI"
  OTEL_ENABLED: "false"
externalSecret:
  enabled: true
  secrets:
    - key: dev-postgres-notification-url
      property: DATABASE_URL
    - key: dev-sendgrid-api-key
      property: SENDGRID_API_KEY
