serviceName: ms-notification-service
image:
  repository: astha-platform/ms-notification-service
  tag: "v1.0.0"
config:
  APP_NAME: "ms-notification-service"
  APP_PORT: "5000"
  APP_LOG_LEVEL: "INFO"
  REDIS_URL: "redis://redis.dev.svc.cluster.local:6379/0"
externalSecret:
  enabled: true
  secrets:
    - key: dev-postgres-notification-url
      property: DATABASE_URL
    - key: dev-sendgrid-api-key
      property: SENDGRID_API_KEY
