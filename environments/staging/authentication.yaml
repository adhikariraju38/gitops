serviceName: ms-authentication-service

image:
  repository: astha-platform/ms-authentication-service
  tag: "latest"

config:
  SERVICE_NAME: "ms-authentication-service"
  DATABASE_HOST: "10.1.0.2"  # Cloud SQL private IP (update after deploy)
  DATABASE_NAME: "auth"
  DATABASE_PORT: "5432"
  REDIS_HOST: "redis.staging.svc.cluster.local"
  REDIS_PORT: "6379"

externalSecret:
  enabled: true
  secrets:
    - key: postgres-auth-password
      property: DATABASE_PASSWORD
    - key: keycloak-client-secret
      property: KEYCLOAK_CLIENT_SECRET
